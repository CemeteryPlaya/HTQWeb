# ═══════════════════════════════════════════════════════════════════════════
# HTQWeb API Gateway (Nginx) — Production with HTTPS
# ═══════════════════════════════════════════════════════════════════════════
#
# Architecture:
#   React SPA → Nginx (Gateway) → [Microservices | Legacy Django]
#
# HTTPS setup:
#   1. Start with HTTP only (certbot needs port 80 for ACME challenge)
#   2. Run: docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot -d your-domain.com --email you@email.com --agree-tos
#   3. Uncomment the HTTPS server block below
#   4. docker compose restart nginx
#
# ═══════════════════════════════════════════════════════════════════════════

# ─── Upstream definitions ────────────────────────────────────────────────────

upstream legacy_backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream user_service {
    server user-service:8005;
    keepalive 16;
}

upstream tasks_service {
    server task-service:8007;
    keepalive 16;
}

upstream hr_service {
    server hr-service:8006;
    keepalive 16;
}

upstream messenger_service {
    server messenger-service:8008;
    keepalive 16;
}

upstream media_service {
    server media-service:8009;
    keepalive 16;
}

upstream email_service {
    server email-service:8010;
    keepalive 16;
}

upstream cms_service {
    server cms-service:8011;
    keepalive 16;
}

# ─── Rate limiting zones ────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=websocket:10m   rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_public:10m  rate=10r/m;

# ─── Custom log format for observability ────────────────────────────────────
log_format gateway '$time_iso8601 | '
                   '$remote_addr | '
                   '$request_id | '
                   '$request_method $uri | '
                   'status=$status | '
                   'bytes=$body_bytes_sent | '
                   'upstream=$upstream_addr | '
                   'upstream_status=$upstream_status | '
                   'response_time=$request_time | '
                   '"$http_user_agent"';

# ═══════════════════════════════════════════════════════════════════════════
# HTTP Server (port 80)
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    access_log /var/log/nginx/gateway_access.log gateway;
    error_log  /var/log/nginx/gateway_error.log warn;

    # ─── Let's Encrypt ACME challenge ───────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ─── Health check (always on HTTP for Docker/LB) ────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","gateway":"nginx","timestamp":"$time_iso8601"}';
        add_header Content-Type application/json;
    }

    # ─── Redirect all other traffic to HTTPS (uncomment after getting cert) ─
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # ─── Below: HTTP fallback (remove after enabling HTTPS redirect) ────────

    # Efficient file transfer
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    gzip_static on;
    brotli on;
    brotli_static on;
    brotli_types text/plain text/css application/json application/javascript image/svg+xml;

    etag on;

    # Security headers
    add_header X-Gateway "htqweb" always;
    add_header X-Request-ID $request_id always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Readiness check
    location /health/ready {
        access_log off;
        proxy_pass http://legacy_backend/health/;
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_down;
    }

    location @backend_down {
        internal;
        return 503 '{"status":"degraded","gateway":"nginx","upstream":"legacy_backend","error":"unreachable"}';
        add_header Content-Type application/json;
    }

    # ─── Frontend (Vite build) ──────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }
    }

    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /fonts/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* ^/(images|logos)/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /locales/ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Tasks API → Tasks Service ─────────────────────────────────────────
    location /api/tasks/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://tasks_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── HR Public API (stricter rate limit, no auth) ──────────────────────
    location /api/hr/v1/public/ {
        limit_req zone=api_public burst=5 nodelay;
        proxy_pass http://hr_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    10s;
        proxy_connect_timeout  5s;
    }

    # ─── HR API → HR Service ───────────────────────────────────────────────
    location /api/hr/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://hr_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── Auth endpoints → User Service ─────────────────────────────────────
    location /api/token/ {
        limit_req zone=api_auth burst=2 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    10s;
        proxy_connect_timeout  3s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /api/token/refresh/ {
        limit_req zone=api_auth burst=2 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    10s;
        proxy_connect_timeout  3s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /api/register/ {
        limit_req zone=api_auth burst=2 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    10s;
        proxy_connect_timeout  3s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /api/pending-registrations/ {
        limit_req zone=api_general burst=10 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    15s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /api/v1/profile/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    15s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /api/v1/admin/users/ {
        limit_req zone=api_general burst=10 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    15s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── User Service V1 (Profile, Me) ──────────────────────────────────────
    location /api/users/v1/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://user_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    15s;
        proxy_connect_timeout  5s;
    }

    # ─── Messenger API ──────────────────────────────────────────────────────
    location /api/messenger/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://messenger_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ─── Media API ──────────────────────────────────────────────────────────
    location /api/media/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://media_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    60s;
        proxy_connect_timeout  5s;
    }

    # ─── CMS API ────────────────────────────────────────────────────────────
    location /api/cms/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://cms_service;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ─── WebSocket — SFU signaling ──────────────────────────────────────────
    location /ws/sfu/ {
        limit_req zone=websocket burst=5 nodelay;
        proxy_pass http://sfu:4443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── WebSocket — Messenger / general ────────────────────────────────────
    location /ws/ {
        limit_req zone=websocket burst=20 nodelay;
        proxy_pass http://messenger_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Django API — catch-all fallback ────────────────────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://legacy_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          8 16k;
        proxy_busy_buffers_size 32k;

        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ─── Django admin ───────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://legacy_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # ─── Static files ───────────────────────────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Media files ────────────────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;

        aio            on;
        directio       512;
        output_buffers 2 512k;
    }
}

