worker_processes  1;

events {
    worker_connections  1024;
}

http {
    default_type  application/octet-stream;

    sendfile      on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Tunnel-safe fallback:
    # Route only root WebSocket upgrades with ?sfu=1 to SFU.
    # Keep all other traffic (and Vite HMR websocket with ?token=...) on frontend.
    map "$http_upgrade:$arg_sfu" $root_upstream {
        default            http://127.0.0.1:3000;
        "~*websocket:1"    http://127.0.0.1:4443/;
    }

    server {
        listen 8080;
        listen [::]:8080;
        server_name _;

        client_max_body_size 10m;

        location = /ws/sfu {
            return 308 /ws/sfu/;
        }

        # NOTE: trailing slash strips "/ws/sfu/" prefix before forwarding.
        # SFU runs plain HTTP locally; TLS is terminated by instatunnel at the edge.
        location /ws/sfu/ {
            proxy_pass http://127.0.0.1:4443/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        location / {
            proxy_pass $root_upstream;
            proxy_http_version 1.1;
            # Needed for Vite HMR websocket (/?token=...) when frontend runs in dev mode.
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
