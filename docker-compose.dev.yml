# ═══════════════════════════════════════════════════════════════════════════════
# HTQWeb — Development override
# ═══════════════════════════════════════════════════════════════════════════════
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d --build
#
# What changes vs production:
#   - frontend: Vite dev server with HMR on :3000 (replaces one-shot build)
#   - All services: SERVICE_ENV=development (enables /docs, verbose logs)
#   - DB/Redis/PgBouncer: host ports exposed for local tooling
#   - nginx: disabled (Vite proxy handles routing to microservices)
#   - frontend source mounted as volume — changes reflect immediately
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── Turn off nginx in dev (Vite dev server handles proxy) ──────────────────
  nginx:
    profiles:
      - production-only

  # ─── Vite dev server with HMR ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_DEV_HTTPS: "false"
      VITE_BACKEND_HTTP_TARGET: "http://backend:8000"
      VITE_HR_SERVICE_TARGET: "http://hr-service:8006"
      VITE_TASKS_SERVICE_TARGET: "http://task-service:8007"
      VITE_USER_SERVICE_TARGET: "http://user-service:8005"
      VITE_BACKEND_WS_TARGET: "ws://backend:8000"
      VITE_SFU_WS_TARGET: "ws://sfu:4443"
    depends_on:
      - backend
      - hr-service
      - user-service
      - task-service

  # ─── Enable /docs and dev-mode logs for all services ────────────────────────
  backend:
    environment:
      DEBUG: "True"

  hr-service:
    environment:
      SERVICE_ENV: development

  user-service:
    environment:
      SERVICE_ENV: development

  task-service:
    environment:
      SERVICE_ENV: development
