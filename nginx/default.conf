server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ─── Efficient file transfer ─────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;   # batch headers + first data in one packet
    tcp_nodelay     on;   # disable Nagle for keep-alive connections
    keepalive_timeout 65;

    # ─── Compression (gzip) ──────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # Serve pre-compressed .gz files if available (from Vite build)
    gzip_static on;

    # Uncomment if nginx is built with ngx_brotli module (e.g. fholzer/nginx-brotli):
    brotli on;
    brotli_static on;
    brotli_types text/plain text/css application/json application/javascript image/svg+xml;

    # ─── ETag support ─────────────────────────────────────────────────────────
    etag on;

    # ─── Frontend (Vite build) ───────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # HTML — no cache (SPA entry point must always be fresh)
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }
    }

    # Hashed assets — immutable cache (Vite adds content hash to filenames)
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Self-hosted fonts — immutable cache (filenames are stable)
    location /fonts/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images & logos — long cache
    location ~* ^/(images|logos)/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # i18n locale JSON files — short cache
    location /locales/ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── WebSocket — SFU signaling proxy (backend-owned endpoint) ─────────────
    location /ws/sfu/ {
        proxy_pass http://sfu:4443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── WebSocket — messenger real-time connection ───────────────────────────
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Django API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffering — helps with compressed/chunked Django responses
        proxy_buffering        on;
        proxy_buffer_size      16k;
        proxy_buffers          8 16k;
        proxy_busy_buffers_size 32k;

        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
    }

    # ─── Django admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static files (Django collectstatic) ─────────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Media files (uploads) — chunked / range-request support ─────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";

        # Tell clients we support partial content (video seeking, resumable downloads)
        add_header Accept-Ranges bytes;

        # Nginx handles Range requests natively when serving from alias.
        # Large files are streamed in chunks automatically via sendfile + aio.
        aio            on;
        directio       512;   # use O_DIRECT for files > 512 bytes (bypasses OS cache for very large files)
        output_buffers 2 512k;
    }
}
