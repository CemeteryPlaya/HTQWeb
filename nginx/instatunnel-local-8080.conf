server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    client_max_body_size 10m;

    # Normalize the WS endpoint so clients without trailing slash still work.
    location = /ws/sfu {
        return 308 /ws/sfu/;
    }

    # SFU signaling (WebSocket): /ws/sfu/* -> 127.0.0.1:4443/*
    # NOTE: trailing slash in proxy_pass is required to strip /ws/sfu/ prefix.
    location /ws/sfu/ {
        proxy_pass https://127.0.0.1:4443/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # Frontend app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        # Needed for Vite HMR websocket (/?token=...) when frontend runs in dev mode.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
