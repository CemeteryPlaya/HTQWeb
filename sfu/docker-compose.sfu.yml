# ─────────────────────────────────────────────────────────
# Docker Compose — SFU Server (Mediasoup)
#
# Usage:
#   docker compose -f docker-compose.sfu.yml up -d
#
# Requires:
#   - SSL certificates in ./ssl/ directory
#   - .env file (copy from .env.example)
# ─────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── Mediasoup SFU Server ──
  sfu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: htqweb-sfu
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SFU_PORT:-4443}:4443"
      # RTP media port range
      - "10000-10999:10000-10999/udp"
      - "10000-10999:10000-10999/tcp"
    volumes:
      - ./ssl:/etc/ssl:ro
    networks:
      - sfu-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    # Enable CPU pinning for Mediasoup workers
    # (uncomment for production)
    # cpuset: "0-3"

  # ── TURN/STUN Server (coturn) ──
  coturn:
    image: coturn/coturn:latest
    container_name: htqweb-turn
    restart: unless-stopped
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"       # TLS
      - "49152-65535:49152-65535/udp"  # Relay ports
    volumes:
      - ./ssl:/etc/ssl:ro
      - ./turnserver.conf:/etc/turnserver.conf:ro
    networks:
      - sfu-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

networks:
  sfu-net:
    driver: bridge
