# ─────────────────────────────────────────────────────────
# coturn Configuration — TURN/STUN Server for NAT Traversal
#
# Deploy alongside SFU in KZ datacenter (Almaty Tier III)
# Target latency to Taraz: < 25-30 ms
# ─────────────────────────────────────────────────────────

# Server name
server-name=turn.htqweb.kz

# Public IP of the TURN server (replace with actual)
external-ip=YOUR_PUBLIC_IP

# Listening ports
listening-port=3478
tls-listening-port=5349

# Relay port range
min-port=49152
max-port=65535

# Authentication
realm=htqweb.kz
user=htqweb:YOUR_TURN_SECRET

# TLS certificates
cert=/etc/ssl/certs/fullchain.pem
pkey=/etc/ssl/private/privkey.pem

# Force TLS 1.3 minimum
no-tlsv1
no-tlsv1_1
no-tlsv1_2

# Performance
total-quota=100
stale-nonce=600
proc-user=turnserver
proc-group=turnserver

# Logging
log-file=/var/log/turnserver.log
simple-log

# Security
no-multicast-peers
fingerprint
lt-cred-mech
