<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preload critical fonts (eliminates FOIT) -->
  <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/fonts/outfit-latin.woff2" crossorigin />

  <!-- Critical inline CSS: self-hosted fonts + base styles -->
  <style>
    /* ── Inter (Variable-weight subset, latin) ── */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300 800;
      font-display: swap;
      src: url('/fonts/inter-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }
    /* Inter latin-ext (Cyrillic + extended characters) */
    @font-face {
      font-family: 'Inter';
      font-style: normal;
      font-weight: 300 800;
      font-display: swap;
      src: url('/fonts/inter-latin-ext.woff2') format('woff2');
      unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+0400-04FF, U+1C80-1C8A, U+1E00-1EFF, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215;
    }
    /* ── Outfit (latin) ── */
    @font-face {
      font-family: 'Outfit';
      font-style: normal;
      font-weight: 400 800;
      font-display: swap;
      src: url('/fonts/outfit-latin.woff2') format('woff2');
      unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #fff;
    }

    #root {
      min-height: 100vh;
    }
  </style>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <title>Hi Tech Group - Construction service in energy sector</title>
  <meta name="description" content="Hi Tech Group - Construction service in energy sector" />
  <meta name="author" content="Hi Tech Group" />

  <meta property="og:title" content="Hi Tech Group - Construction service in energy sector" />
  <meta property="og:description" content="Hi Tech Group - Construction service in energy sector" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
