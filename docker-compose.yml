# ─── Performance Note (Windows) ─────────────────────────────────────────────
# Running from Windows /mnt/c/ (cross-OS bridge) adds ~500ms latency per
# static file I/O. For production-like performance and accurate Lighthouse
# testing, clone the repo into the WSL2 native filesystem:
#   ~/projects/HTQWeb1  (NOT /mnt/c/Users/.../HTQWeb1)
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL ───────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-htqweb}
      POSTGRES_USER: ${DB_USER:-htqweb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-ltree.sql:/docker-entrypoint-initdb.d/01-ltree.sql:ro
    # No direct host port — connect via PgBouncer (port 55432 on host).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-htqweb}"]
      interval: 5s
      retries: 5

  # ─── PgBouncer (connection pooler) ───────────────
  # Sits between Django and PostgreSQL. Limits actual PG connections to a small
  # pool (default_pool_size=20) while accepting up to 1000 client connections.
  # transaction mode: connection returned to pool after every transaction —
  # safe for Django with CONN_MAX_AGE=0.
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-htqweb}
      DB_USER: ${DB_USER:-htqweb}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    # Expose to host so local Django dev (outside Docker) connects via PgBouncer too.
    ports:
      - "${DB_HOST_PORT:-55432}:5432"
    depends_on:
      db:
        condition: service_healthy

  # ─── Redis (кэш) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ─── Django backend (Gunicorn) ────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      CACHE_BACKEND: django.core.cache.backends.redis.RedisCache
      CACHE_LOCATION: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 HTQWeb.asgi:application"

  # ─── SFU (Mediasoup signaling + media) ────────────
  sfu:
    build:
      context: ./sfu
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SFU_PORT: 4443
      SFU_HOST: 0.0.0.0
      SIGNALING_REQUIRE_TLS: "false"
      WEBRTC_LISTEN_IPS: ${WEBRTC_LISTEN_IPS:-0.0.0.0}
      WEBRTC_ANNOUNCED_IP: ${WEBRTC_ANNOUNCED_IP:-}
      WEBRTC_SERVER_PORT: ${WEBRTC_SERVER_PORT:-44444}
      WEBRTC_ENABLE_UDP: ${WEBRTC_ENABLE_UDP:-true}
      WEBRTC_ENABLE_TCP: ${WEBRTC_ENABLE_TCP:-true}
      WEBRTC_PREFER_UDP: ${WEBRTC_PREFER_UDP:-false}
      WEBRTC_PREFER_TCP: ${WEBRTC_PREFER_TCP:-false}
      VIDEO_BITRATE_BPS: ${VIDEO_BITRATE_BPS:-12000000}
      AUDIO_BITRATE_BPS: ${AUDIO_BITRATE_BPS:-192000}
      TURN_URL: ${TURN_URL:-}
      TURN_URLS: ${TURN_URLS:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "4443:4443"
      - "${WEBRTC_SERVER_PORT:-44444}:${WEBRTC_SERVER_PORT:-44444}/udp"
      - "${WEBRTC_SERVER_PORT:-44444}:${WEBRTC_SERVER_PORT:-44444}/tcp"

  # ─── Frontend builder (one-shot: builds Vite dist into shared volume) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/html
    restart: "no"

  # ─── Nginx (reverse proxy + frontend) ────────────
  nginx:
    image: fholzer/nginx-brotli:latest
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      - frontend
      - backend
      - sfu

  # ─── WebTransport Proxy (QUIC signaling for browsers supporting WebTransport) ──
  webtransport:
    build:
      context: ./backend/webtransport
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # WebSocket URL of the SFU — reachable from within the Docker network
      SFU_WS_URL: "ws://sfu:4443"
      WT_HOST: "0.0.0.0"
      WT_PORT: "4433"
      LOG_LEVEL: ${WT_LOG_LEVEL:-INFO}
    ports:
      # UDP for QUIC. Must be exposed directly — NGINX cannot proxy UDP.
      - "4433:4433/udp"
    volumes:
      # Mount a real TLS certificate in production:
      #   docker-compose.yml → volumes: - ./certs:/app/certs:ro
      # For local dev the Dockerfile generates a self-signed cert automatically.
      - wt_certs:/app/certs
    depends_on:
      - sfu

  # ─── MinIO (S3-compatible object storage, optional) ──
  # Раскомментируйте для использования S3 хранилища.
  # Не забудьте выставить STORAGE_BACKEND=s3 в .env
  #
  # minio:
  #   image: minio/minio:latest
  #   restart: unless-stopped
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
  #     MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   volumes:
  #     - minio_data:/data
  #   healthcheck:
  #     test: ["CMD", "mc", "ready", "local"]
  #     interval: 5s
  #     retries: 5

volumes:
  postgres_data:
  static_files:
  media_files:
  wt_certs:
  frontend_dist:
  # minio_data:
