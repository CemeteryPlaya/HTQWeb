# ═══════════════════════════════════════════════════════════════════════════════
# HTQWeb — Production Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Quick start:
#   1. cp .env.production .env    (fill in secrets)
#   2. docker compose up -d --build
#   3. docker compose ps          (verify all services are healthy)
#
# For HTTPS with Let's Encrypt:
#   1. Set SERVER_DOMAIN=your-domain.com in .env
#   2. docker compose up -d
#   3. docker compose exec certbot certbot certonly --webroot \
#        -w /var/www/certbot -d your-domain.com --email your@email.com --agree-tos
#   4. docker compose restart nginx
#
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL ───────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-htqweb}
      POSTGRES_USER: ${DB_USER:-htqweb}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-ltree.sql:/docker-entrypoint-initdb.d/01-ltree.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-htqweb}"]
      interval: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PgBouncer (connection pooler) ───────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-htqweb}
      DB_USER: ${DB_USER:-htqweb}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U ${DB_USER:-htqweb} || exit 1"]
      interval: 3s
      retries: 10
      start_period: 5s
      timeout: 3s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (кэш + channel layer) ────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Django backend (Daphne ASGI) ───────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override local .env values for Docker networking
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_ENGINE: django.db.backends.postgresql
      CACHE_BACKEND: django.core.cache.backends.redis.RedisCache
      CACHE_LOCATION: redis://redis:6379/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── User/Identity Service (JWT authority) ──────
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-htqweb}
      DB_USER: ${DB_USER:-htqweb}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_SCHEMA: auth
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-to-django-secret-key}
      JWT_ALGORITHM: HS256
      JWT_ISSUER: htqweb-auth
      SERVICE_NAME: user-identity
      SERVICE_PORT: 8005
      SERVICE_ENV: ${SERVICE_ENV:-production}
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        PYTHONPATH=/app alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8005
      "
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8005/health/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── HR Service ─────────────────────────────────
  hr-service:
    build:
      context: ./services/hr
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-htqweb}
      DB_USER: ${DB_USER:-htqweb}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_SCHEMA: public
      REDIS_URL: redis://redis:6379/1
      JWT_SECRET: ${JWT_SECRET:-change-me-to-django-secret-key}
      JWT_ALGORITHM: HS256
      JWT_ISSUER: htqweb-auth
      SERVICE_NAME: hr-service
      SERVICE_PORT: 8006
      SERVICE_ENV: ${SERVICE_ENV:-production}
      API_PREFIX: /api/hr/v1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8006/health/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Task Service ───────────────────────────────
  task-service:
    build:
      context: ./services/task
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-htqweb}
      DB_USER: ${DB_USER:-htqweb}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      DB_SCHEMA: public
      REDIS_URL: redis://redis:6379/2
      JWT_SECRET: ${JWT_SECRET:-change-me-to-django-secret-key}
      JWT_ALGORITHM: HS256
      JWT_ISSUER: htqweb-auth
      SERVICE_NAME: task-service
      SERVICE_PORT: 8007
      SERVICE_ENV: ${SERVICE_ENV:-production}
      API_PREFIX: /api/tasks/v1
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8007/health/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── SFU (Mediasoup signaling + media) ──────────
  sfu:
    build:
      context: ./sfu
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SFU_PORT: 4443
      SFU_HOST: 0.0.0.0
      SIGNALING_REQUIRE_TLS: "false"
      SIGNALING_WS_PATHS: /,/ws/sfu,/ws/sfu/
      SIGNALING_DISABLE_ORIGIN_CHECK: "true"
      WEBRTC_LISTEN_IPS: ${WEBRTC_LISTEN_IPS:-0.0.0.0}
      WEBRTC_ANNOUNCED_IP: ${WEBRTC_ANNOUNCED_IP:-}
      WEBRTC_SERVER_PORT: ${WEBRTC_SERVER_PORT:-44444}
      WEBRTC_ENABLE_UDP: ${WEBRTC_ENABLE_UDP:-true}
      WEBRTC_ENABLE_TCP: ${WEBRTC_ENABLE_TCP:-true}
      WEBRTC_PREFER_UDP: ${WEBRTC_PREFER_UDP:-true}
      WEBRTC_PREFER_TCP: ${WEBRTC_PREFER_TCP:-false}
      VIDEO_BITRATE_BPS: ${VIDEO_BITRATE_BPS:-1500000}
      AUDIO_BITRATE_BPS: ${AUDIO_BITRATE_BPS:-64000}
      TURN_URL: ${TURN_URL:-}
      TURN_URLS: ${TURN_URLS:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "4443:4443"
      - "${WEBRTC_SERVER_PORT:-44444}:${WEBRTC_SERVER_PORT:-44444}/udp"
      - "${WEBRTC_SERVER_PORT:-44444}:${WEBRTC_SERVER_PORT:-44444}/tcp"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Frontend builder (one-shot) ────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - frontend_dist:/html
    restart: "no"

  # ─── Nginx (reverse proxy + frontend + SSL) ─────
  nginx:
    image: fholzer/nginx-brotli:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      # SSL: Let's Encrypt certificates
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
      - sfu
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── Certbot (Let's Encrypt SSL) ────────────────
  # Run once to obtain certificate, then renews automatically.
  # Usage:
  #   docker compose run --rm certbot certonly --webroot \
  #     -w /var/www/certbot -d your-domain.com --email your@email.com --agree-tos
  # Auto-renewal cron:
  #   docker compose run --rm certbot renew && docker compose restart nginx
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # By default: do nothing (run manually or via cron)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─── WebTransport Proxy (QUIC signaling) ────────
  webtransport:
    build:
      context: ./backend/webtransport
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SFU_WS_URL: "ws://sfu:4443"
      WT_HOST: "0.0.0.0"
      WT_PORT: "4433"
      LOG_LEVEL: ${WT_LOG_LEVEL:-INFO}
    ports:
      - "4433:4433/udp"
    volumes:
      - wt_certs:/app/certs
    depends_on:
      - sfu
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
  static_files:
  media_files:
  wt_certs:
  frontend_dist:
  certbot_conf:
  certbot_webroot:
